name: Elle Daemon Schedule

# Cloudflare crons were removed (free-plan account-wide limit). The daemon loops
# are driven here instead, via POST /api/cron (service-key gated).
# NOTE: GitHub Actions schedules are best-effort — they can be delayed 5-30+ min
# and skipped under load. Not suitable for precise/per-minute timing.
# Requires repo secret: ELLE_SERVICE_KEY (must equal the worker's ELLE_SERVICE_KEY).

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'heartbeat | trading | research | dream | journal'
        required: true
        default: heartbeat
  schedule:
    - cron: '*/15 * * * *'        # heartbeat (coarse liveness; GH min granularity)
    - cron: '5,20,35,50 * * * *'  # trading (market-hours gated server-side)
    - cron: '0 * * * *'           # research
    - cron: '0 3 * * *'           # dream
    - cron: '0 20 * * *'          # journal

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Select job
        id: sel
        run: |
          case "${{ github.event.schedule }}" in
            "*/15 * * * *")       echo "job=heartbeat" >> "$GITHUB_OUTPUT" ;;
            "5,20,35,50 * * * *") echo "job=trading"   >> "$GITHUB_OUTPUT" ;;
            "0 * * * *")          echo "job=research"  >> "$GITHUB_OUTPUT" ;;
            "0 3 * * *")          echo "job=dream"     >> "$GITHUB_OUTPUT" ;;
            "0 20 * * *")         echo "job=journal"   >> "$GITHUB_OUTPUT" ;;
            *)                    echo "job=${{ github.event.inputs.job }}" >> "$GITHUB_OUTPUT" ;;
          esac
      - name: Trigger ${{ steps.sel.outputs.job }}
        run: |
          curl -fsS -X POST "https://elle.sbarteau2022.workers.dev/api/cron" \
            -H "Authorization: Bearer ${{ secrets.ELLE_SERVICE_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"job\":\"${{ steps.sel.outputs.job }}\"}"
