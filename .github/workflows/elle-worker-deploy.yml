name: Deploy Elle Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy of this worker at a time. Prevents a push and a manual
# run (or rapid pushes) from racing two `wrangler deploy` calls against the
# same worker, which makes one of them fail.
concurrency:
  group: deploy-elle-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
