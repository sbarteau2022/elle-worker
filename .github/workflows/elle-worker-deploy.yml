name: Deploy Elle Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one deploy of this worker at a time. Prevents a push and a manual
# run (or rapid pushes) from racing two `wrangler deploy` calls against the
# same worker, which makes one of them fail.
concurrency:
  group: deploy-elle-worker
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      # `npm install`, not `npm ci`: the committed lockfile is generated in a
      # single-platform environment, so it can omit other-OS optional deps
      # (@cloudflare/workerd-*, @img/sharp-*). npm 11 on the runner rejects that
      # under the strict `npm ci` check ("Missing … from lock file"); `npm
      # install` reconciles it instead. Deps are pinned by version ranges either
      # way, and there's nothing here that a floating patch would break.
      - run: npm install --no-audit --no-fund
      - name: Deploy
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
