name = "elle-worker"
main = "src/index.ts"
# Must be <= the latest compatibility date the Cloudflare runtime has released
# (the bundled workerd is 1.20260625 → max supported date is 2026-06-25). A date
# set to "today" (2026-06-26) is newer than the released runtime, so `wrangler
# deploy` is rejected by the API even though `--dry-run` (no API validation)
# passes — that was the Workers Builds "Deployment failed" on this project.
compatibility_date = "2026-06-25"
compatibility_flags = ["nodejs_compat"]

# Workers Logs — persist runtime logs so server-side errors (e.g.
# "[ROUTER] model layer unreachable: <real provider error>") are queryable in
# the dashboard (Workers & Pages → elle-worker → Logs) instead of needing a
# live `wrangler tail`. Traces left off.
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[ai]
binding = "AI"

# Service binding to the RAPID²AI hospitality worker. No longer used by the
# router's own tool calls (see RAPID_DB below — those run natively against
# the same database instead of proxying HTTP through this binding), but left
# declared/bound in case anything else still depends on it.
[[services]]
binding = "RAPID_AI"
service = "rapid2ai-ai-worker"

[[d1_databases]]
binding = "DB"
database_name = "elle-corpus"
database_id = "4ed6773a-e5c5-4708-8738-73ae9f57fc9b"

# Native binding onto RAPID²AI's own database. Lets the router's rapid_*
# tools (src/rapid.ts) query directly instead of proxying HTTP calls through
# the RAPID_AI service binding below — no 1042 risk, no dead /tool 404s.
[[d1_databases]]
binding = "RAPID_DB"
database_name = "rapid2ai-db"
database_id = "3e31b005-eca1-4c62-bd7c-5f6527ef751e"

[[kv_namespaces]]
binding = "SESSIONS"
id = "b659cdfdac084cbc9d502c4f26962047"

[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "eaef117dc6e74e17b8c4c4717ea3727b"

# Router scratchpad — short-TTL working memory (src/scratchpad.ts).
[[kv_namespaces]]
binding = "SCRATCHPAD"
id = "ce5b567ebc66438e8f54c3a63ad7cb18"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "elle-documents"

[[vectorize]]
binding = "VECTORIZE"
index_name = "elle-corpus-vectors"

# NOTE: real code execution (run_code/run_shell via the Cloudflare Sandbox
# SDK) is intentionally NOT wired here. It requires a Containers-enabled
# account plus a Docker image build at deploy time, and the Dockerfile.sandbox
# template it shipped with references a turbo/pnpm monorepo (@repo/sandbox-
# container) that this repo is not — so `wrangler deploy` failed on the image
# build on every push, blocking ALL deploys. With no [[containers]]/Durable
# Object binding, env.SANDBOX is undefined and run_code/run_shell cleanly
# report "SANDBOX binding not configured" (see src/sandbox-tools.ts). Elle's
# real code execution remains the forge: she writes to an elle/* branch and
# CI runs it. To re-enable the sandbox later: set up a valid container image,
# re-add [[containers]] + [[durable_objects.bindings]] + a [[migrations]]
# block, restore the @cloudflare/sandbox dependency, and re-import it in
# src/sandbox-tools.ts.
#
# A prior (manual) deploy DID register the Sandbox Durable Object class on the
# live worker (migration v1, new_sqlite_classes = ["Sandbox"]). Cloudflare will
# not let a new version silently drop a class that existing Durable Objects
# depend on, so removing the class requires an explicit delete-class migration.
# The Sandbox DOs are throwaway code-execution containers with no durable user
# data, so deleting them loses nothing. v1 stays listed for history (already
# applied, not re-run); v2 removes the class.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Sandbox"]

[[migrations]]
tag = "v2"
deleted_classes = ["Sandbox"]

[[queues.producers]]
binding = "INGEST_QUEUE"
queue = "elle-ingest-queue"

[[queues.consumers]]
queue = "elle-ingest-queue"
max_batch_size = 10
max_batch_timeout = 30

# A single */1 cron trigger drives all daemon loops via clock-dispatch in
# scheduled() (heartbeat every min; trading :*/15; research hourly; dream 03:00
# UTC; journal 20:00 UTC). Uses 1 of the 5-per-account cron budget, not 5.
# IMPORTANT: keep this block — `wrangler deploy` reconciles triggers to this file,
# so removing it deletes the live cron and silently stops the daemon.
[triggers]
crons = ["*/1 * * * *"]

[vars]
ENVIRONMENT = "production"
# Venue UUID in rapid2ai-db that the rapid_* tools (src/rapid.ts) scope
# every query to. rapid2ai-db is multi-tenant by venue_id; without this set
# the rapid_* tools cleanly report "VENUE_ID not configured" rather than
# guessing. Find the value with:
#   wrangler d1 execute rapid2ai-db --remote --command "SELECT DISTINCT venue_id FROM vendor_document_payload LIMIT 5"
VENUE_ID = ""
