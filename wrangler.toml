name = "elle"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "elle-corpus"
database_id = "4ed6773a-e5c5-4708-8738-73ae9f57fc9b"

[[kv_namespaces]]
binding = "SESSIONS"
id = "b659cdfdac084cbc9d502c4f26962047"

[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "eaef117dc6e74e17b8c4c4717ea3727b"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "elle-documents"

[[vectorize]]
binding = "VECTORIZE"
index_name = "elle-corpus-vectors"

[[queues.producers]]
binding = "INGEST_QUEUE"
queue = "elle-ingest-queue"

[[queues.consumers]]
queue = "elle-ingest-queue"
max_batch_size = 10
max_batch_timeout = 30

# 1 cron only -- free plan account-wide limit exceeded at 3
# dream (0 3) + journal (0 20) + trading (*/15) + research (0 *) all HTTP-triggered
[triggers]
crons = [
  "*/1 * * * *"
]

[vars]
ENVIRONMENT = "production"
