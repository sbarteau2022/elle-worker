name = "elle-worker"
main = "src/index.ts"
# Must be <= the oldest workerd bundled by any wrangler version this project
# runs with. `wrangler deploy` validates against the latest released runtime
# (fine up to 2026-06-25), but `wrangler dev` runs 100% locally against
# whatever workerd shipped with the installed wrangler binary — which lags
# behind if that install is stale (e.g. wrangler 4.95.0 only bundles workerd
# up to 2026-06-02), and local dev then fails hard with "This Worker requires
# compatibility date ... but the newest date supported by this server binary
# is ...". Pinning to 2026-06-02 keeps both `deploy` and `dev` working
# regardless of which supported wrangler version is installed locally; bump
# it only after confirming `npx wrangler --version` is current everywhere
# `wrangler dev` gets run.
compatibility_date = "2026-06-02"
compatibility_flags = ["nodejs_compat"]

# Bundle the corpus seed documents (corpus/**/*.md) as Text modules, so
# src/corpus-seed.ts can `import doc from '../corpus/.../x.md'` and get the file
# contents as a string. The seedCorpus job ingests any that aren't in the corpus
# yet (chunk/embed/vectorize/index) — the docs live as real, version-controlled
# files rather than pasted into source.
[[rules]]
type = "Text"
globs = ["**/*.md"]
fallback = true

# Workers Logs — persist runtime logs so server-side errors (e.g.
# "[ROUTER] model layer unreachable: <real provider error>") are queryable in
# the dashboard (Workers & Pages → elle-worker → Logs) instead of needing a
# live `wrangler tail`. Traces left off.
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true

[ai]
binding = "AI"

# Service binding to the RAPID²AI hospitality worker. No longer used by the
# router's own tool calls (see RAPID_DB below — those run natively against
# the same database instead of proxying HTTP through this binding), but left
# declared/bound in case anything else still depends on it.
[[services]]
binding = "RAPID_AI"
service = "rapid2ai-ai-worker"

[[d1_databases]]
binding = "DB"
database_name = "elle-corpus"
database_id = "4ed6773a-e5c5-4708-8738-73ae9f57fc9b"

# Native binding onto RAPID²AI's own database. Lets the router's rapid_*
# tools (src/rapid.ts) query directly instead of proxying HTTP calls through
# the RAPID_AI service binding below — no 1042 risk, no dead /tool 404s.
[[d1_databases]]
binding = "RAPID_DB"
database_name = "rapid2ai-db"
database_id = "3e31b005-eca1-4c62-bd7c-5f6527ef751e"

[[kv_namespaces]]
binding = "SESSIONS"
id = "b659cdfdac084cbc9d502c4f26962047"

[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "eaef117dc6e74e17b8c4c4717ea3727b"

# Router scratchpad — short-TTL working memory (src/scratchpad.ts).
[[kv_namespaces]]
binding = "SCRATCHPAD"
id = "ce5b567ebc66438e8f54c3a63ad7cb18"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "elle-documents"

[[vectorize]]
binding = "VECTORIZE"
index_name = "elle-corpus-vectors"

# Real code execution — the CONNECT-BACK sandbox. The dead end here was the
# Cloudflare Sandbox SDK: it needs a Containers-enabled account and a Docker
# image build at deploy time, and its Dockerfile.sandbox template references a
# turbo/pnpm monorepo (@repo/sandbox-container) this repo is not — so `wrangler
# deploy` failed on the image build on EVERY push, blocking ALL deploys. We do
# not re-enter that trap. Execution happens on the operator's own laptop, but
# there is no Durable Object holding a socket anymore either: the laptop POLLS
# /api/sandbox-bus/poll for sealed jobs and SUBMITS sealed results back — a
# stateless event bus (session-bus.ts), COROS sealed under hyperbolic-sync's
# counter-free keystream. No container image, no Containers entitlement, no
# deploy-time build, no standing connection. See src/session-bus.ts +
# src/connect-sandbox.ts.

# Migration history. v1 registered the old (container) Sandbox class; v2
# removed it. v3 registered the connect-back SandboxAgent (a plain DO holding
# a WebSocket); v4 removes it now that the session bus (above) replaces the
# socket with stateless polling — no DO needed for the sandbox at all. The
# earlier tags stay listed as already-applied history and are never re-run.
[[migrations]]
tag = "v1"
new_sqlite_classes = ["Sandbox"]

[[migrations]]
tag = "v2"
deleted_classes = ["Sandbox"]

[[migrations]]
tag = "v3"
new_classes = ["SandboxAgent"]

[[migrations]]
tag = "v4"
deleted_classes = ["SandboxAgent"]

[[queues.producers]]
binding = "INGEST_QUEUE"
queue = "elle-ingest-queue"

[[queues.consumers]]
queue = "elle-ingest-queue"
max_batch_size = 10
max_batch_timeout = 30

# A single */1 cron trigger drives all daemon loops via clock-dispatch in
# scheduled() (heartbeat every min; trading :*/15; research hourly; dream 03:00
# UTC; journal 20:00 UTC). Uses 1 of the 5-per-account cron budget, not 5.
# IMPORTANT: keep this block — `wrangler deploy` reconciles triggers to this file,
# so removing it deletes the live cron and silently stops the daemon.
[triggers]
crons = ["*/1 * * * *"]

[vars]
ENVIRONMENT = "production"
# LEGACY/DEMO FALLBACK venue for anonymous /api/atlas callers. Signed-in
# Atlas clients get their venue PER REQUEST from atlas_clients (self-serve
# signup, src/atlas-clients.ts) — this var no longer gates the whole product.
# rapid2ai-db is multi-tenant by venue_id; without this set, anonymous
# rapid_* calls cleanly report "VENUE_ID not configured" rather than
# guessing. Find a value with:
#   wrangler d1 execute rapid2ai-db --remote --command "SELECT DISTINCT venue_id FROM vendor_document_payload LIMIT 5"
VENUE_ID = ""

# LIVE TRADING is a TWO-KEY operation (src/live-guard.ts): a non-paper
# ALPACA_BASE_URL is refused everywhere unless the ELLE_LIVE_TRADING secret
# is exactly 'on'. Arm deliberately with:
#   wrangler secret put ELLE_LIVE_TRADING   (value: on)
# Never set it here in [vars] — a committed 'on' would defeat the second key.
