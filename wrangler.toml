name = "elle"
main = "dist/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "elle-corpus"
database_id = "4ed6773a-e5c5-4708-8738-73ae9f57fc9b"

[[kv_namespaces]]
binding = "SESSIONS"
id = "b659cdfdac084cbc9d502c4f26962047"

[[kv_namespaces]]
binding = "AUTH_TOKENS"
id = "eaef117dc6e74e17b8c4c4717ea3727b"

[[r2_buckets]]
binding = "DOCUMENTS"
bucket_name = "elle-documents"

[[vectorize]]
binding = "VECTORIZE"
index_name = "elle-corpus-vectors"

[[queues.producers]]
binding = "INGEST_QUEUE"
queue = "elle-ingest-queue"

[[queues.consumers]]
queue = "elle-ingest-queue"
max_batch_size = 10
max_batch_timeout = 30

# Cron schedule
[triggers]
crons = [
  "*/1 * * * *",   # heartbeat + maintenance
  "*/15 * * * *",  # trading cycle (market hours only)
  "0 * * * *",     # research cycle (Gemini + Google Search)
  "0 3 * * *",     # dream cycle (memory integration)
  "0 20 * * *"     # daily journal (4pm ET market close)
]

[vars]
ENVIRONMENT = "production"

# Secrets — wrangler secret put <NAME>
#
# LLM providers:
#   LLM_OPENROUTER_KEY     openrouter.ai
#   LLM_GEMINI_KEY         aistudio.google.com
#   LLM_GROK_KEY           console.x.ai (optional)
#
# Model overrides (free tier defaults if not set):
#   LLM_MODEL_PRIMARY      nvidia/nemotron-3-ultra-550b-a55b:free
#   LLM_MODEL_FAST         meta-llama/llama-3.3-70b-instruct:free
#   LLM_MODEL_CODE         qwen/qwen3-coder:free
#   LLM_MODEL_REASONING    gemini-2.5-flash-preview-05-20
#
# Elle auth (already set):
#   JWT_SECRET
#   ELLE_SERVICE_KEY
#
# Alpaca trading — single key + base URL:
#   ALPACA_API_KEY         your Alpaca API key
#   ALPACA_BASE_URL        https://paper-api.alpaca.markets
#                          (switch to https://api.alpaca.markets for live)
#
# GitHub:
#   GITHUB_TOKEN
